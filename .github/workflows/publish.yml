---
name: Publish to PyPI

on:
  push:
    tags: ["*"]
  workflow_dispatch:

jobs:

  test:
    uses: ./.github/workflows/tests.yml
    
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_matches_version: ${{ steps.version_check.outputs.tag_matches_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches pyproject version
        id: version_check
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              data = tomllib.load(handle)

          version = data["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          match = str(version == tag).lower()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"tag_matches_version={match}\n")
          PY
        env:
          PYTHONUTF8: "1"

      - name: Parse tags
        id: parse_tags
        run: |
          git fetch -a
          echo "tag_count=$(git tag -l | wc -l)" >> $GITHUB_OUTPUT

      - name: Check if tag commit is on main
        id: branch_check
        run: |
          git fetch origin main --depth=1
          if git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "on_main=true" >> $GITHUB_OUTPUT
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout main for changelog commit
        if: steps.branch_check.outputs.on_main == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update CHANGELOG
        id: changelog
        if: steps.branch_check.outputs.on_main == 'true'
        uses: requarks/changelog-action@v1
        continue-on-error: ${{ steps.parse_tags.outputs.tag_count == '1' }}
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: false
          makeLatest: true
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes || format('Release {0}', github.ref_name) }}
          token: ${{ github.token }}

      - name: Commit CHANGELOG.md
        if: steps.branch_check.outputs.on_main == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: update CHANGELOG.md for ${{ github.ref_name }}'
          file_pattern: CHANGELOG.md

  docs:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: write

  publish:
    if: startsWith(github.ref, 'refs/tags/') && needs.release.outputs.tag_matches_version == 'true'
    needs:
      - release
      - docs
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - name: Setup python and restore poetry
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          cache: "poetry"

      - name: Build package
        run: poetry build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
